<!doctype html>

<html lang="en">
  <head>
    <!-- Basic Meta -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Title (VERY IMPORTANT for SEO) -->
    <title>Yaritrip | Book Flights, Hotels & Travel Packages</title>

    <!-- Meta Description -->
    <meta
      name="description"
      content="Yaritrip helps you book affordable flights, hotels, and travel packages. Explore top destinations, plan your trips, and travel smarter with Yaritrip."
    />

    <!-- Keywords (optional but okay) -->
    <meta
      name="keywords"
      content="travel booking, flights, hotels, vacation packages, Yaritrip, cheap flights, travel deals"
    />

    <!-- Author -->
    <meta name="author" content="Yaritrip" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/Logo.png" />

    <!-- Canonical URL -->
    <link rel="canonical" href="https://www.yaritrip.com/" />

    <!-- Open Graph (Facebook, LinkedIn) -->
    <meta property="og:title" content="Yaritrip | Travel Smart, Travel Easy" />
    <meta
      property="og:description"
      content="Book flights, hotels, and travel packages easily with Yaritrip."
    />
    <meta property="og:image" content="/Logo.png" />
    <meta property="og:url" content="https://www.yaritrip.com/" />
    <meta property="og:type" content="website" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Yaritrip | Travel Smart" />
    <meta
      name="twitter:description"
      content="Find best travel deals on flights, hotels, and holiday packages."
    />
    <meta name="twitter:image" content="/Logo.png" />

    <!-- Robots -->
    <meta name="robots" content="index, follow" />

    <!-- Theme Color -->
    <meta name="theme-color" content="#2563eb" />

    <!-- Preconnect (Performance Optimization) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Structured Data (SEO Boost) -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "TravelAgency",
        "name": "Yaritrip",
        "url": "https://www.yaritrip.com",
        "logo": "https://www.yaritrip.com/Logo.png",
        "sameAs": ["https://www.instagram.com/", "https://www.linkedin.com/"]
      }
    </script>
  </head>

  <body>
    <!-- Root App -->
    <div id="root"></div>

    <!-- Main JS -->
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
